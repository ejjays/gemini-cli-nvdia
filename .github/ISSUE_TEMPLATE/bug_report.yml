name: 'Termux Bug Report'
description: 'Report a Termux/Android issue in Gemini CLI Termux'
body:
  - type: 'markdown'
    attributes:
      value: |-
        > [!IMPORTANT]
        > Thanks for taking the time to fill out this bug report.
        >
        > Use this tracker for Termux/Android packaging and runtime issues.
        > Generic Gemini CLI issues should be reported upstream at
        > https://github.com/google-gemini/gemini-cli/issues.

  - type: 'textarea'
    id: 'problem'
    attributes:
      label: 'What happened?'
      description: 'A clear and concise description of what the bug is.'
    validations:
      required: true

  - type: 'textarea'
    id: 'expected'
    attributes:
      label: 'What did you expect to happen?'
    validations:
      required: true

  - type: 'textarea'
    id: 'info'
    attributes:
      label: 'Client information'
      description: 'Please paste the full text from the `/about` command. Remove your email address before submitting if present.'
      value: |-
        <details>
        <summary>Client Information</summary>

        Run `gemini` to enter the interactive CLI, then run the `/about` command.

        ```console
        > /about
        # paste output here
        ```

        </details>
    validations:
      required: true

  - type: 'textarea'
    id: 'termux-info'
    attributes:
      label: 'Termux information'
      description: 'Include Android device, Android version, Termux source, Node.js version, and install command.'

  - type: 'textarea'
    id: 'additional-context'
    attributes:
      label: 'Anything else we need to know?'
      description: 'Add any other context about the problem here.'
