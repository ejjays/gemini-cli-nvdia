name: 'Termux Feature Request'
description: 'Suggest a Termux/Android compatibility improvement'
body:
  - type: 'markdown'
    attributes:
      value: |-
        > [!IMPORTANT]
        > Thanks for taking the time to suggest an enhancement.
        >
        > This fork only carries Termux/Android compatibility changes.
        > Generic Gemini CLI feature requests belong upstream:
        > https://github.com/google-gemini/gemini-cli/issues.

  - type: 'textarea'
    id: 'feature'
    attributes:
      label: 'What would you like to be added?'
      description: 'A clear and concise description of the enhancement.'
    validations:
      required: true

  - type: 'textarea'
    id: 'rationale'
    attributes:
      label: 'Why is this needed?'
      description: 'A clear and concise description of why this enhancement is needed.'
    validations:
      required: true

  - type: 'textarea'
    id: 'additional-context'
    attributes:
      label: 'Additional context'
      description: 'Add any other context or screenshots about the feature request here.'
