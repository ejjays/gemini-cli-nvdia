name: 'Documentation issue'
description: 'Report an issue with this fork documentation'
title: 'Docs: [ISSUE]'
body:
  - type: 'markdown'
    attributes:
      value: |-
        > [!IMPORTANT]
        > Report only documentation issues in this Termux fork.
  - type: 'input'
    id: 'url'
    attributes:
      label: 'URL of the page with the issue'
      description: 'Please provide the URL where the issue occurs.'
    validations:
      required: true

  - type: 'textarea'
    id: 'problem'
    attributes:
      label: 'What is the problem?'
      description: 'A clear and concise description of what the bug or issue is.'
    validations:
      required: true

  - type: 'textarea'
    id: 'expected'
    attributes:
      label: 'What did you expect to happen?'
    validations:
      required: true

  - type: 'textarea'
    id: 'additional-context'
    attributes:
      label: 'Additional context'
      description: 'Add any other context or screenshots about the issue here.'
