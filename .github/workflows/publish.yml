name: Publish

on:
  workflow_dispatch:
    inputs:
      tag:
        description: npm dist-tag to publish
        required: true
        default: latest
        type: choice
        options:
          - latest
          - next
      create_release:
        description: Create GitHub release for package version
        required: true
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  publish:
    name: Publish npm package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify Termux patches
        run: bash scripts/check-termux-patches.sh

      - name: Build
        run: npm run build

      - name: Bundle
        run: npm run bundle

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --tag "${{ inputs.tag }}" --access public

      - name: Create GitHub release
        if: ${{ inputs.create_release }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="$(node -p "require('./package.json').version")"
          tag="v${version}"
          notes="Gemini CLI Termux ${version}

Fork release based on upstream Gemini CLI 0.42.0.

Install:

```bash
npm install -g @mmmbuto/gemini-cli-termux@${{ inputs.tag }}
```
"
          gh release create "${tag}" --title "${tag}" --notes "${notes}" || \
            gh release edit "${tag}" --title "${tag}" --notes "${notes}"
